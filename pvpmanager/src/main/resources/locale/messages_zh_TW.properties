# You can customize these messages to your language, change colors, etc
# You can disable any message by deleting everything after the equals (=)
# Example: Newbie_Protection = (leave this empty)
# You may also use Hex color codes such as &#FFFFFF in MC 1.16+
# There are some variables you can use in this file that work in all messages
# such as {prefix} and some that only work where they make sense such as {player}, {time} and {money}

Prefix = &c[&8PvPManager&c]

# PvP Toggle
PvP_Disabled = {prefix} &2已停用 PvP！
PvP_Enabled = {prefix} &4已啟用 PvP！
Attack_Denied_You = {prefix} &4你有 PvP 保護！
Attack_Denied_Other = {prefix} &4{player} 有 PvP 保護！
PvP_Force_Enabled_WorldGuard = {prefix} &c因為你在 PvP 區域內，所以強制啟用 PvP
PvP_Disabled_Fee = {prefix} &3你花費了 &5{money} 元&3停用 PvP
PvP_Disabled_Fee_Not_Enough = {prefix} &3因為你沒有足夠的金錢，所以已啟用 PvP

# Combat Tag
Tagged_Attacker = {prefix} &7你被標記了&f {player}&7！不要離開，否則你將受到懲罰！
Tagged_Attacker_ActionBar = &7你已標記&f {player}&7！在你退出戰鬥之前不要登出！
Tagged_Defender = {prefix} &7你被&f {player}&7 標記了！不要登出伺服器，否則你將受到懲罰！
Tagged_Defender_ActionBar = &7你被&f {player}&7 標記了！在你退出戰鬥之前不要登出！
Out_Of_Combat = {prefix} &a你不再處於戰鬥狀態。
Out_Of_Combat_ActionBar = &a你已不處於戰鬥狀態
Command_Denied_InCombat = {prefix} &c指令已經被拒絕使用！你還在戰鬥中！
Block_Place_Blocked_InCombat = {prefix} &4你無法在戰鬥中放置任何方塊！
Block_Break_Blocked_InCombat = {prefix} &4你無法在戰鬥中破壞任何方塊！
Eating_Blocked_InCombat = {prefix} &4無法在戰鬥中進食！
EnderPearl_Blocked_InCombat = {prefix} &4你無法在戰鬥中使用終界珍珠！
ChorusFruit_Blocked_InCombat = "{prefix} &4你無法在戰鬥中吃歌萊果！
Interact_Blocked_InCombat = {prefix} &4你無法在戰鬥中使用點擊右鍵！
Teleport_Blocked_InCombat = {prefix} &c你無法在戰鬥中使用傳送！
Totem_Blocked_InCombat = {prefix} &c無法在戰鬥中使用不死圖騰！
Inventory_Blocked_InCombat = {prefix} &c你無法在戰鬥中開啟任何容器！
Pushback_Warning = &c無法在戰鬥中跑到安全區域！

# Newbie Protection
Newbie_Protection = {prefix} &a歡迎！你在 &6 %&a 分鐘內免受 PvP 攻擊
Newbie_Protection_End = {prefix} &c你的 PvP 保護已到期！你現在可以被攻擊！
Newbie_Protection_Removed = {prefix} &e你移除了你的 PVP 保護！請小心
Newbie_Protection_On_Hit = {prefix} &4你現在處於 PvP 保護！如果你真的想進行 PvP，請使用 &2/newbie disable 將其停用
Newbie_Protection_Atacker = {prefix}&4 {player} 擁有新手保護！
Newbie_Time_Check = {prefix} &7你在 &e{time}��免受 PvP 攻擊
Newbie_Time_Check_Other = {prefix}&7 {player} 在接下來的 &e{time}��免受 PvP 攻擊
Newbie_Command_Blocked = {prefix} &c當你有新手保護時，你不能使用此指令！
Newbie_Pickup_Items_Blocked = {prefix} &c當你有新手保護時你不能拾取物品
Newbie_Force_Removed_WorldGuard = {prefix} &c你的新手保護因處於 PvP 區域內而被移除

# Respawn Protection
Respawn_Protection = {prefix}&4 你有重生保護！
Respawn_Protection_Other = {prefix}&4 {player} 有重生保護！

# World Protection
World_Protection = {prefix}&4 已停用此世界的 PvP！

# AFK Protection
AFK_Protection = {prefix}&4 此玩家在 AFK 時無法受到攻擊

# Global Protection
Global_Protection = {prefix} &4已停用全域 PvP 戰鬥

# Player Kills
Money_Reward = &2You got {money} coins for killing player {victim}！
Money_Penalty = &c你因為被殺而損失了 %m 元！
Money_Steal = &c{player} 從你那裡偷走了 %m 元！

# Commands
Error_Command = &4你沒有使用該指令的權限或指令不存在！
Error_Permission = &4你沒有使用該指令的權限！
Error_Player_Not_Found = &4玩家 {player} 不存在或離線！
Error_Not_Player = 此指令僅適用於玩家
# Newbie Command
Error_Not_Newbie = {prefix} &c你不是新手！
# PvP Command
Error_PvP_Cooldown = {prefix} &c你還不能切換 PvP！等待 %t 分鐘 %m 秒。
Error_PvPToggle_NoPvP = {prefix} &c你被禁止啟用 PvP
Error_PvPToggle_ForcePvP = {prefix} &c你被禁止停用 PvP
PvPToggle_Admin_Changed = {prefix} &6{player} &2的 &2PvP 狀態已變更為 %state
PvPToggle_Already_Disabled = {prefix} &4你已停用 PvP！
PvPToggle_Already_Enabled = {prefix} &4你已啟用 PvP！
# PvPInfo Command
PvPInfo_Title = &e&lPvPManager 資訊
PvPInfo_Line1 = &2- 名稱：&f
PvPInfo_Line2 = &2- UUID：&f
PvPInfo_Line3 = &2- PVP 狀態：&f
PvPInfo_Line4 = &2- 在戰鬥中：&f
PvPInfo_Line5 = &2- 新手：&f
PvPInfo_Line6 = &2- 世界：&f
PvPInfo_Line7 = &2- 覆蓋 PvP：&f
# PvPList Command
PvPList_Title = &6&l---- PVP 玩家列表 ----
PvPList_Enabled = &a&l已啟用
PvPList_Disabled = &4&l已停用
PvPList_Nothing_Found = &8沒有找到任何玩家
# PvPStatus Command
Other_Status_Enabled = {prefix} &6玩家 {player} 已啟用 PvP
Others_Status_Disabled = {prefix} &6玩家 {player} 已停用 PvP
Self_Status_Disabled = {prefix} &6你已停用 PVP
Self_Status_Enabled = {prefix} &6你已啟用 PVP
# Tag Command
Tag_Timeleft = &8你還有 {time} 秒的戰鬥時間
Tag_Not_In_Combat = &c你目前不在戰鬥中

# Variables
Enabled = &c已啟用
Disabled = &a已停用
